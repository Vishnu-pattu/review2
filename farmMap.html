<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="common/style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="common/app.js"></script>

</head>

<body>

<!-- LANGUAGE SELECT -->
<select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="ta">தமிழ்</option>
<option value="hi">हिंदी</option>
</select>

<h2 id="locationTitle">Farm Location</h2>

<input id="district" placeholder="District">
<input id="village" placeholder="Village">

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<br><br>

<button onclick="findLocation()" id="findBtn">Find My Location</button>

<br><br>

<div id="map" style="height:400px"></div>

<br>

<button onclick="saveLocation()" id="nextBtn">Next</button>

<script>

let map=L.map("map").setView([11.1271,78.6569],7)

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

let marker


// CLICK MAP LOCATION
map.on("click",function(e){

let lat=e.latlng.lat
let lng=e.latlng.lng

document.getElementById("lat").value=lat
document.getElementById("lng").value=lng

if(marker){
map.removeLayer(marker)
}

marker=L.marker([lat,lng]).addTo(map)

})


// FIND GPS LOCATION
function findLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude
let lng=position.coords.longitude

document.getElementById("lat").value=lat
document.getElementById("lng").value=lng

map.setView([lat,lng],13)

if(marker){
map.removeLayer(marker)
}

marker=L.marker([lat,lng]).addTo(map)

})

}else{

alert("Geolocation not supported")

}

}

</script>

</body>
</html>
